project_id = "avisus"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = false
sql_paths = []

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000", "http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email.template.confirmation]
subject = "Confirme seu cadastro no Avisus"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Redefina sua senha no Avisus"
content_path = "./supabase/templates/recovery.html"
